    \"$:/config/flibbles/relink/messages/tm-new-tiddler\": {\n            \"title\": \"$:/config/flibbles/relink/messages/tm-new-tiddler\",\n            \"text\": \"(.*)\"\n        },\n        \"$:/config/flibbles/relink/operators/filter\": {\n            \"title\": \"$:/config/flibbles/relink/operators/filter\",\n            \"text\": \"filter\"\n        },\n        \"$:/config/flibbles/relink/operators/list\": {\n            \"title\": \"$:/config/flibbles/relink/operators/list\",\n            \"text\": \"reference\"\n        },\n        \"$:/config/flibbles/relink/operators/subfilter\": {\n            \"title\": \"$:/config/flibbles/relink/operators/subfilter\",\n            \"text\": \"filter\"\n        },\n        \"$:/config/flibbles/relink/operators/tag\": {\n            \"title\": \"$:/config/flibbles/relink/operators/tag\",\n            \"text\": \"title\"\n        },\n        \"$:/config/flibbles/relink/operators/title\": {\n            \"title\": \"$:/config/flibbles/relink/operators/title\",\n            \"text\": \"title\"\n        },\n        \"$:/config/flibbles/relink/operators/field:title\": {\n            \"title\": \"$:/config/flibbles/relink/operators/field:title\",\n            \"text\": \"title\"\n        },\n        \"$:/config/flibbles/relink/operators/relink:report\": {\n            \"title\": \"$:/config/flibbles/relink/operators/relink:report\",\n            \"text\": \"title\"\n        },\n        \"$:/language/EditTemplate/Title/Impossibles/Prompt\": {\n            \"title\": \"$:/language/EditTemplate/Title/Impossibles/Prompt\",\n            \"text\": \"''Warning:'' Not all references in the following tiddlers can be updated by //Relink// due to the complexity of the new title:\"\n        },\n        \"$:/language/EditTemplate/Title/References/Prompt\": {\n            \"title\": \"$:/language/EditTemplate/Title/References/Prompt\",\n            \"text\": \"The following tiddlers will be updated if relinking:\"\n        },\n        \"$:/language/EditTemplate/Title/Relink/Prompt\": {\n            \"title\": \"$:/language/EditTemplate/Title/Relink/Prompt\",\n            \"text\": \"Use //Relink// to update ''\u003C$text text=\u003C\u003CfromTitle>>/>'' to ''\u003C$text text=\u003C\u003CtoTitle>>/>'' across all other tiddlers\"\n        },\n        \"$:/core/ui/EditTemplate/title\": {\n            \"title\": \"$:/core/ui/EditTemplate/title\",\n            \"tags\": \"$:/tags/EditTemplate\",\n            \"text\": \"\\\\whitespace trim\\n\u003C$edit-text field=\\\"draft.title\\\" class=\\\"tc-titlebar tc-edit-texteditor\\\" focus={{{ [{$:/config/AutoFocus}match[title]then[true]] ~[[false]] }}} tabindex={{$:/config/EditTabIndex}} cancelPopups=\\\"yes\\\" dir={{$:/config/DefaultTextDirection}}/>\\n\\n\u003C$vars pattern=\\\"\\\"\\\"[\\\\|\\\\[\\\\]{}]\\\"\\\"\\\" bad-chars=\\\"\\\"\\\"`| [ ] { }`\\\"\\\"\\\">\\n\\n\u003C$list filter=\\\"[all[current]regexp:draft.title\u003Cpattern>]\\\" variable=\\\"listItem\\\">\\n\\n\u003Cdiv class=\\\"tc-message-box\\\" dir={{$:/config/DefaultTextDirection}}>\\n\\n{{$:/core/images/warning}}&#32;{{$:/language/EditTemplate/Title/BadCharacterWarning}}\\n\\n\u003C/div>\\n\\n\u003C/$list>\\n\\n\u003C/$vars>\\n\\n\u003C$reveal state=\\\"!!draft.title\\\" type=\\\"nomatch\\\" text={{!!draft.of}} tag=\\\"div\\\" dir={{$:/config/DefaultTextDirection}}>\\n\\n\u003C$list filter=\\\"[{!!draft.title}!is[missing]]\\\" variable=\\\"listItem\\\">\\n\\n\u003Cdiv class=\\\"tc-message-box\\\">\\n\\n{{$:/core/images/warning}}&#32;{{$:/language/EditTemplate/Title/Exists/Prompt}}:&#32;\u003C$link to={{!!draft.title}} />\\n\\n\u003C/div>\\n\\n\u003C/$list>\\n\\n\u003C$list filter=\\\"[{!!draft.of}!is[missing]]\\\" variable=\\\"listItem\\\">\\n\\n\u003C$vars fromTitle={{!!draft.of}} toTitle={{!!draft.title}}>\\n\\n\u003C$checkbox tiddler=\\\"$:/config/RelinkOnRename\\\" field=\\\"text\\\" checked=\\\"yes\\\" unchecked=\\\"no\\\" default=\\\"no\\\">&#32;{{$:/language/EditTemplate/Title/Relink/Prompt}}\u003C/$checkbox>\\n\\n\u003C$tiddler tiddler=\u003C\u003CfromTitle>> >\\n\\n\u003C$list filter=\\\"[relink:wouldchange\u003CtoTitle>limit[1]]\\\" variable=\\\"listItem\\\">\\n\\n\u003C$vars stateTiddler=\u003C\u003Cqualify \\\"$:/state/edit/references\\\">> >\\n\\n\u003C$set\\n\\tname=\\\"prompt\\\"\\n\\tfilter=\\\"[relink:wouldchange\u003CtoTitle>relink:impossible\u003CtoTitle>]\\\"\\n\\tvalue=\\\"EditTemplate/Title/Impossibles/Prompt\\\"\\n\\temptyValue=\\\"EditTemplate/Title/References/Prompt\\\" >\\n\u003C$reveal type=\\\"nomatch\\\" state=\u003C\u003CstateTiddler>> text=\\\"show\\\">\\n\u003C$button set=\u003C\u003CstateTiddler>> setTo=\\\"show\\\" class=\\\"tc-btn-invisible\\\">\\n{{$:/core/images/right-arrow}}\\n&#32;\\n\u003C$macrocall $name=lingo title=\u003C\u003Cprompt>> />\\n\u003C/$button>\\n\u003C/$reveal>\\n\u003C$reveal type=\\\"match\\\" state=\u003C\u003CstateTiddler>> text=\\\"show\\\">\\n\u003C$button set=\u003C\u003CstateTiddler>> setTo=\\\"hide\\\" class=\\\"tc-btn-invisible\\\">\\n{{$:/core/images/down-arrow}}\\n&#32;\\n\u003C$macrocall $name=lingo title=\u003C\u003Cprompt>> />\\n\u003C/$button>\\n\u003C/$reveal>\\n\u003C/$set>\\n\\n\u003C$reveal type=\\\"match\\\" state=\u003C\u003CstateTiddler>> text=\\\"show\\\">\\n\u003C$list variable=\\\"listItem\\\" filter=\\\"[relink:wouldchange\u003CtoTitle>!title[$:/StoryList]sort[title]]\\\" template=\\\"$:/plugins/flibbles/relink/ui/ListItemTemplate\\\">\\n\u003C/$list>\\n\u003C/$reveal>\\n\\n\u003C/$vars>\\n\\n\u003C/$list>\\n\\n\u003C/$tiddler>\\n\\n\u003C/$vars>\\n\\n\u003C/$list>\\n\\n\u003C/$reveal>\\n\"\n        },\n        \"$:/config/flibbles/relink/PluginLibrary\": {\n            \"title\": \"$:/config/flibbles/relink/PluginLibrary\",\n            \"caption\": \"//Relink// Library\",\n            \"url\": \"https://flibbles.github.io/tw5-relink/library/index.html\",\n            \"tags\": \"$:/tags/PluginLibrary\",\n            \"text\": \"The //Relink// library contains //Relink// as well as its supplemental plugins. It is maintained by Flibbles. See the [[github page|https://github.com/flibbles/tw5-relink]] for more information.\\n\"\n        },\n        \"$:/plugins/flibbles/relink/readme\": {\n            \"title\": \"$:/plugins/flibbles/relink/readme\",\n            \"type\": \"text/vnd.tiddlywiki\",\n            \"text\": \"When renaming a tiddler, Relink can update the fields, filters, and widgets\\nof all other tiddlers. However, it works through whitelisting.\\n\\nIt's already configured to update tiddler titles for all core widgets, filters,\\nand fields, but the whitelists can be customized for each of this in the\\nconfiguration panel.\\n\\nSee \u003Ca href={{$:/plugins/flibbles/relink!!source}} class=\\\"tc-tiddlylink-external\\\">the tw5-relink website\u003C/a> for more details and examples.\\n\"\n        },\n        \"$:/config/flibbles/relink/settings/default-type\": {\n            \"title\": \"$:/config/flibbles/relink/settings/default-type\",\n            \"text\": \"title\"\n        },\n        \"$:/config/flibbles/relink/touch-modify\": {\n            \"title\": \"$:/config/flibbles/relink/touch-modify\",\n            \"text\": \"yes\"\n        },\n        \"$:/config/DefaultColourMappings/relink-impossible\": {\n            \"title\": \"$:/config/DefaultColourMappings/relink-impossible\",\n            \"text\": \"\u003C\u003Ccolour dirty-indicator>>\"\n        },\n        \"$:/language/Docs/PaletteColours/relink-impossible\": {\n            \"title\": \"$:/language/Docs/PaletteColours/relink-impossible\",\n            \"text\": \"Relink link impossible\"\n        },\n        \"$:/plugins/flibbles/relink/ui/ListItemTemplate\": {\n            \"title\": \"$:/plugins/flibbles/relink/ui/ListItemTemplate\",\n            \"text\": \"\\\\whitespace trim\\n\u003C$set\\n\\tname=\\\"classes\\\"\\n\\tfilter=\\\"[\u003ClistItem>relink:impossible\u003CtoTitle>]\\\"\\n\\tvalue=\\\"tc-menu-list-item tc-relink-impossible\\\"\\n\\temptyValue=\\\"tc-menu-list-item\\\">\\n\u003Cdiv class=\u003C\u003Cclasses>>>\\n\u003C$link to=\u003C\u003ClistItem>>>\u003C$text text=\u003C\u003ClistItem>> />\u003C/$link>\\n\u003C/div>\\n\u003C/$set>\\n\"\n        },\n        \"$:/plugins/flibbles/relink/ui/ListItemWithBlurbTemplate\": {\n            \"title\": \"$:/plugins/flibbles/relink/ui/ListItemWithBlurbTemplate\",\n            \"text\": \"\u003Cdiv class=\\\"tc-menu-list-item\\\">\u003C$link />\u003C/div>\\n\u003C$list variable=blurb filter=\\\"[\u003CcurrentTiddler>relink:report\u003CmissingTiddler>]\\\">\u003Cdiv class=\\\"tc-relink-menu-missing-blurb\\\">\u003C$text text=\u003C\u003Cblurb>> />\u003C/div>\\n\"\n        },\n        \"$:/plugins/flibbles/relink/ui/MissingTemplate\": {\n            \"title\": \"$:/plugins/flibbles/relink/ui/MissingTemplate\",\n            \"text\": \"\\\\whitespace trim\\n\u003C$set name=\\\"missingTiddler\\\" value=\u003C\u003CcurrentTiddler>> >\\n\u003Cdiv class=\\\"tc-tiddler-missing\\\">\\n\u003C$button popup=\u003C\u003Cqualify \\\"$:/state/relink/popup/missing\\\">> class=\\\"tc-btn-invisible tc-missing-tiddler-label\\\">\\n\u003C$view field=\\\"title\\\" format=\\\"text\\\" />\\n\u003C/$button>\\n\u003C$reveal state=\u003C\u003Cqualify \\\"$:/state/relink/popup/missing\\\">> type=\\\"popup\\\" position=\\\"below\\\" animate=\\\"yes\\\">\\n\u003Cdiv class=\\\"tc-drop-down\\\">\\n\u003C$transclude tiddler=\\\"$:/core/ui/ListItemTemplate\\\"/>\\n\u003Chr>\\n\u003C$list filter=\\\"[all[current]relink:backreferences[]sort[title]]\\\" template=\\\"$:/plugins/flibbles/relink/ui/ListItemWithBlurbTemplate\\\"/>\\n\u003C/div>\\n\u003C/$reveal>\\n\u003C/div>\\n\u003C/$set>\\n\"\n        },\n        \"$:/plugins/flibbles/relink/ui/MoreSideBar/Missing\": {\n            \"title\": \"$:/plugins/flibbles/relink/ui/MoreSideBar/Missing\",\n            \"caption\": \"{{$:/plugins/flibbles/relink/language/SideBar/Missing/Caption}}\",\n            \"tags\": \"$:/tags/MoreSideBar\",\n            \"text\": \"\u003C$list filter={{$:/plugins/flibbles/relink/Filters/Missing!!filter}} template=\\\"$:/plugins/flibbles/relink/ui/MissingTemplate\\\" />\\n\"\n        },\n        \"$:/plugins/flibbles/relink/ui/MoreSideBar/Orphans\": {\n            \"title\": \"$:/plugins/flibbles/relink/ui/MoreSideBar/Orphans\",\n            \"caption\": \"{{$:/plugins/flibbles/relink/language/SideBar/Orphans/Caption}}\",\n            \"tags\": \"$:/tags/MoreSideBar\",\n            \"text\": \"\u003C$list filter={{$:/plugins/flibbles/relink/Filters/Orphans!!filter}} template=\\\"$:/core/ui/ListItemTemplate\\\" />\\n\"\n        },\n        \"$:/plugins/flibbles/relink/ui/TiddlerInfo/References\": {\n            \"title\": \"$:/plugins/flibbles/relink/ui/TiddlerInfo/References\",\n            \"caption\": \"{{$:/plugins/flibbles/relink/language/TiddlerInfo/References/Caption}}\",\n            \"tags\": \"$:/tags/TiddlerInfo\",\n            \"text\": \"\\\\define lingo-base() $:/plugins/flibbles/relink/language/TiddlerInfo/\\n\\\\define filter() [all[current]relink:backreferences[]!title[$:/StoryList]!prefix[$:/temp/]sort[title]]\\n\\\\whitespace trim\\n\u003C$list filter=\\\"[subfilter\u003Cfilter>first[]]\\\">\\n\u003C\u003Clingo References/Description>>\\n\u003C/$list>\\n\u003Ctable class=\\\"tc-relink-references-table\\\">\\n\u003Ctbody>\\n\u003C$vars toTitle='' >\\n\u003C$list filter=\u003C\u003Cfilter>> emptyMessage=\u003C\u003Clingo References/Empty>> variable=\\\"listItem\\\" template=\\\"$:/plugins/flibbles/relink/ui/TiddlerInfo/ReferencesTemplate\\\" />\\n\u003C/$vars>\\n\u003C/tbody>\\n\u003C/table>\\n\"\n        },\n        \"$:/plugins/flibbles/relink/ui/TiddlerInfo/ReferencesTemplate\": {\n            \"title\": \"$:/plugins/flibbles/relink/ui/TiddlerInfo/ReferencesTemplate\",\n            \"text\": \"\\\\whitespace trim\\n\u003Ctr class=\\\"tc-relink-references\\\">\\n\u003Ctd class={{{ tc-relink-references-title [\u003CtoTitle>!match[]then\u003ClistItem>relink:impossible\u003CtoTitle>then[tc-relink-impossible]] +[join[ ]] }}} >\\n\\t\u003C$list\\n\\t\\tvariable=whitelist\\n\\t\\tfilter=\\\"[\u003ClistItem>removeprefix[$:/config/flibbles/relink/]split[/]first[]titlecase[]addprefix[$:/plugins/flibbles/relink/ui/configuration/]]\\\"\\n\\t\\temptyMessage=\\\"\u003C$link to=\u003C\u003ClistItem>>/>\\\" >\\n\\t\\t\u003C$link to=\u003C\u003Cwhitelist>>>\\n\\t\\t\\t''//Relink//&#32;whitelist''\\n\\t\\t\u003C/$link>\\n\\t\u003C/$list>\\n\u003C/td>\\n\u003Ctd class=\\\"tc-relink-references-report\\\">\\n\\t\u003C$list filter=\\\"[\u003ClistItem>relink:report\u003CcurrentTiddler>]\\\">\\n\\n\\t\\t\u003C$text text=\u003C\u003CcurrentTiddler>> />\\n\\t\u003C/$list>\\n\u003C/td>\u003C/tr>\\n\"\n        },\n        \"$:/plugins/flibbles/relink/ui/components/button-delete\": {\n            \"title\": \"$:/plugins/flibbles/relink/ui/components/button-delete\",\n            \"text\": \"\\\\define lingo-base() $:/plugins/flibbles/relink/language/Buttons/\\n\\\\define prefix() $:/config/flibbles/relink/\\n\\\\whitespace trim\\n\\n\u003C$list\\n\\tfilter=\\\"[all[current]prefix\u003Cprefix>]\\\"\\n\\temptyMessage=\\\"\u003C$link>\u003C$button class='tc-btn-invisible' tooltip={{$:/plugins/flibbles/relink/language/Buttons/LinkToInline/Hint}}>{{$:/core/images/link}}\u003C/$button>\u003C/$link>\\\">\\n\u003C$button class=\\\"tc-btn-invisible\\\" tooltip={{$:/plugins/flibbles/relink/language/Buttons/Delete/Hint}}>\u003C$list filter=\\\"[all[current]is[tiddler]]\\\">\\n\u003C$action-deletetiddler $tiddler=\u003C\u003CcurrentTiddler>> />\\n\u003C/$list>\u003C$list filter=\\\"[all[current]is[shadow]]\\\">\\n\u003C$action-setfield $tiddler=\u003C\u003CtiddlerName>> text=\\\"\\\" />\\n\u003C/$list>\\n{{$:/core/images/delete-button}}\\n\u003C/$button>\\n\u003C/$list>\\n\"\n        },\n        \"$:/plugins/flibbles/relink/ui/components/select-fieldtype\": {\n            \"title\": \"$:/plugins/flibbles/relink/ui/components/select-fieldtype\",\n            \"text\": \"\\\\define prefix() $:/config/flibbles/relink/\\n\\\\whitespace trim\\n\\n\u003C$vars type={{{ [\u003Csignature>relink:type[]] }}} >\\n\u003C$list filter=\\\"[all[current]prefix\u003Cprefix>]\\\" >\\n\u003C$select tiddler=\u003C\u003CcurrentTiddler>> >\\n\u003C$list variable=\\\"option\\\" filter=\\\"[relink:types[]]\\\">\\n\u003Coption>\u003C$text text=\u003C\u003Coption>> />\u003C/option>\\n\u003C/$list>\\n\u003C/$select>\\n\u003C/$list>\u003C$list filter=\\\"[all[current]!prefix\u003Cprefix>]\\\">\\n\u003C$text text=\u003C\u003Ctype>> />\\n\u003C/$list>\\n\u003C/$vars>\\n\"\n        },\n        \"$:/plugins/flibbles/relink/ui/components/tables\": {\n            \"title\": \"$:/plugins/flibbles/relink/ui/components/tables\",\n            \"text\": \"\\\\define .make-table(title, plugin, default-table-state:yes)\\n\\\\whitespace trim\\n\\n\u003C$list variable=\\\"render\\\" filter=\\\"[relink:signatures\u003C__plugin__>prefix\u003C__category__>first[]]\\\">\\n\u003C$vars table-state=\u003C\u003Cqualify \\\"\\\"\\\"$:/state/flibbles/relink/tables/$plugin$\\\"\\\"\\\">>>\\n\u003Ctr>\u003Cth class=\\\"tc-relink-header-plugin\\\" colspan=\u003C\u003Ccolumn-count>> >\\n\u003C$reveal type=\\\"nomatch\\\" state=\u003C\u003Ctable-state>> text=\\\"yes\\\" default=\\\"\\\"\\\"$default-table-state$\\\"\\\"\\\">\\n\u003C$button class=\\\"tc-btn-invisible tc-btn-dropdown\\\" set=\u003C\u003Ctable-state>> setTo=\\\"yes\\\">\\n{{$:/core/images/right-arrow}}&#32;$title$\\n\u003C/$button>\\n\u003C/$reveal>\\n\u003C$reveal type=\\\"match\\\" state=\u003C\u003Ctable-state>> text=\\\"yes\\\" default=\\\"\\\"\\\"$default-table-state$\\\"\\\"\\\">\\n\u003C$button class=\\\"tc-btn-invisible tc-btn-dropdown\\\" set=\u003C\u003Ctable-state>> setTo=\\\"no\\\">\\n{{$:/core/images/down-arrow}}&#32;$title$\\n\u003C/$button>\\n\u003C/$reveal>\\n\u003C/th>\u003C/tr>\\n\u003C$list\\n\\tvariable=\\\"signature\\\"\\n\\tfilter=\\\"[relink:signatures\u003C__plugin__>prefix\u003C__category__>sort[]]\\\">\\n\u003C$vars key={{{ [\u003Csignature>removeprefix\u003C__category__>removeprefix[/]] }}} >\\n\u003C$tiddler tiddler={{{[\u003Csignature>relink:source[]]}}} >\\n\u003C$reveal tag=\\\"tr\\\" type=\\\"match\\\" state=\u003C\u003Ctable-state>> text=\\\"yes\\\" default=\\\"\\\"\\\"$default-table-state$\\\"\\\"\\\">\\n\u003C$macrocall $name=\u003C\u003C__list-row-macro__>> signature=\u003C\u003Csignature>> />\\n\u003Ctd class=\\\"tc-relink-column-type\\\">{{||$:/plugins/flibbles/relink/ui/components/select-fieldtype}}\u003C/td>\\n\u003Ctd class=\\\"tc-relink-column-delete\\\">{{||$:/plugins/flibbles/relink/ui/components/button-delete}}\u003C/td>\\n\u003C/$reveal>\\n\u003C/$tiddler>\\n\u003C/$vars>\\n\u003C/$list>\\n\u003C/$vars>\\n\u003C/$list>\\n\\\\end\\n\\n\\\\define tables(category, list-row-macro, header-list)\\n\\\\whitespace trim\\n\u003C$vars\\n\\tcolumn-count={{{[enlist\u003C__header-list__>] [[DeleteColumn]] +[count[]]}}}>\\n\u003Ctable class=\\\"tc-relink-whitelist\\\">\u003Ctbody>\\n\u003Ctr>\\n\u003C$list variable=\\\"header\\\" filter=\\\"[enlist\u003C__header-list__>butlast[]]\\\">\u003Cth>\u003C\u003Cheader>>\u003C/th>\u003C/$list>\\n\u003C!-- We have the last column extend into the delete/link column, which is unlabeled. -->\\n\u003Cth colspan=2>\u003C$text text={{{ [enlist\u003C__header-list__>last[]] }}} />\u003C/th>\\n\u003C/tr>\\n\u003C\u003C.make-table Custom \\\"\\\" yes>>\\n\\n\u003C$list\\n\\tfilter=\\\"[plugin-type[plugin]![$:/core]![$:/plugins/flibbles/relink]]\\\">\\n\u003C$set name=\\\"subtitle\\\"\\n\\tfilter=\\\"[all[current]has[description]]\\\"\\n\\tvalue=\\\"''{{!!name}}'':&#32;\u003C$text text={{!!description}}/>\\\"\\n\\temptyValue=\\\"''{{!!name}}''\\\" >\\n\u003C$macrocall $name=\\\".make-table\\\" title=\u003C\u003Csubtitle>> plugin=\u003C\u003CcurrentTiddler>> />\\n\u003C/$set>\\n\u003C/$list>\\n\u003C\u003C.make-table Core \\\"$:/plugins/flibbles/relink\\\">>\\n\\n\u003C/tbody>\u003C/table>\\n\u003C/$vars>\\n\\\\end\\n\"\n        },\n        \"$:/plugins/flibbles/relink/ui/configuration/Attributes\": {\n            \"title\": \"$:/plugins/flibbles/relink/ui/configuration/Attributes\",\n            \"caption\": \"{{$:/plugins/flibbles/relink/language/ui/Attributes/Caption}}\",\n            \"tags\": \"$:/tags/flibbles/relink/Configuration\",\n            \"text\": \"\\\\import $:/plugins/flibbles/relink/ui/components/tables\\n\\\\define prefix-attr() $:/config/flibbles/relink/attributes/\\n\\\\define lingo-base() $:/plugins/flibbles/relink/language/Buttons/\\n\\\\define element-name-tiddler() $:/state/flibbles/relink/element-name\\n\\\\define attribute-name-tiddler() $:/state/flibbles/relink/attribute-name\\n\\n\\\\define row()\\n\\\\whitespace trim\\n\u003C$set name='element'\\n      value={{{[\u003Ckey>splitbefore[/]removesuffix[/]]}}}>\\n\u003C$set name=\\\"attribute\\\"\\n      value={{{[\u003Ckey>removeprefix\u003Celement>removeprefix[/]]}}}>\\n\u003Ctd>\u003C$text text=\u003C\u003Celement>> />\u003C/td>\\n\u003Ctd>\u003C$text text=\u003C\u003Cattribute>> />\u003C/td>\\n\u003C/$set>\u003C/$set>\\n\\\\end\\n\\\\define body()\\n\\\\whitespace trim\\n\\n\u003Cem class=\\\"tc-edit\\\">Add a new attribute:\u003C/em>\\n&#32;\\n\u003C$edit-text\\n\\ttiddler=\u003C\u003Celement-name-tiddler>>\\n\\ttag=\\\"input\\\"\\n\\tdefault=\\\"\\\"\\n\\tplaceholder=\\\"widget/element\\\" />\\n&#32;\\n\u003C$edit-text\\n\\ttiddler=\u003C\u003Cattribute-name-tiddler>>\\n\\ttag=\\\"input\\\"\\n\\tdefault=\\\"\\\"\\n\\tplaceholder=\\\"attribute\\\" />\\n&#32;\\n\u003C$reveal type=\\\"nomatch\\\" text=\\\"\\\" state=\u003C\u003Celement-name-tiddler>> >\\n\u003C$reveal type=\\\"nomatch\\\" text=\\\"\\\" state=\u003C\u003Cattribute-name-tiddler>> >\\n\u003C$relinkmangler>\\n\u003C$button\\n\\ttooltip={{$(lingo-base)$NewAttribute/Hint}}\\n\\taria-label={{$(lingo-base)$NewAttribute/Caption}}>\\n\u003C$action-sendmessage\\n\\t$message=\\\"relink-add-attribute\\\"\\n\\telement={{$(element-name-tiddler)$}}             \"title\": \"$:/plugins/flibbles/relink/ui/stylesheet.css\",\n            \"tags\": \"$:/tags/Stylesheet\",\n            \"text\": \".tc-relink-references {\\n}\\n\\n.tc-relink-references-table {\\n\\twidth: 100%;\\n\\tborder: none;\\n}\\n\\n.tc-relink-references-table td {\\n\\tborder-left: none;\\n}\\n\\n.tc-relink-references-table tr:first-child td {\\n\\tborder-top: none;\\n}\\n\\n.tc-relink-references-title {\\n\\ttext-align: left;\\n\\tvertical-align: top;\\n\\tpadding-top: 3px;\\n\\tpadding-bottom: 3px;\\n}\\n\\n.tc-relink-references-occurrence {\\n\\tfont-style: italic;\\n\\ttext-align: left;\\n\\tfont-weight: 200;\\n\\tpadding-left: 25px;\\n\\tvertical-align: top;\\n}\\n\\n.tc-relink-header-plugin {\\n\\ttext-align: left;\\n}\\n\\n.tc-relink-header-plugin button {\\n\\twidth: 100%\\n}\\n\\n.tc-relink-column-type {\\n\\twidth: 8em;\\n}\\n\\n.tc-relink-column-type select {\\n\\twidth: 100%;\\n}\\n\\n.tc-relink-column-delete {\\n\\tborder-left: none;\\n\\ttext-align: left;\\n}\\n\\n.tc-relink-column-delete button {\\n\\tpadding-left: 1em;\\n}\\n\\n.tc-relink-impossible a.tc-tiddlylink {\\n\\tcolor: \u003C\u003Ccolour relink-impossible>>;\\n}\\n\\n.tc-relink-menu-missing-blurb {\\n\\tmargin-left: 30pt;\\n}\\n\"\n        }\n    }\n}"},
{"name":"Relink Titles","title":"$:/plugins/flibbles/relink-titles","description":"Renames tiddlers with titles derived from Relinked tiddler","author":"Flibbles","version":"2.4.0","core-version":">=5.1.22","parent-plugin":"$:/plugins/flibbles/relink","source":"https://github.com/flibbles/tw5-relink","demo":"http://flibbles.github.io/tw5-relink/","list":"readme configuration","dependents":"","plugin-type":"plugin","type":"application/json","text":"{\n    \"tiddlers\": {\n        \"$:/plugins/flibbles/relink-titles/configuration\": {\n            \"title\": \"$:/plugins/flibbles/relink-titles/configuration\",\n            \"caption\": \"{{$:/plugins/flibbles/relink-titles/language/Caption}}\",\n            \"tags\": \"$:/tags/flibbles/relink/Configuration\",\n            \"list-after\": \"\",\n            \"text\": \"\\\\define lingo-base() $:/plugins/flibbles/relink-titles/language/\\n\\\\define prefix() $:/config/flibbles/relink-titles/relink/\\n\\\\whitespace trim\\n\\n\u003Cdiv class=\\\"tc-control-panel\\\">\\n\\n\u003C\u003Clingo Help>>\\n\\n\u003Ctable>\\n\u003Ctbody>\\n\u003C$list filter=\\\"[[relinktitlesrule]modules[]]\\\">\\n\u003Ctr>\\n\u003Ctd>\\n\u003C$checkbox\\n\\ttiddler={{{ [all[current]addprefix\u003Cprefix>] }}}\\n\\tfield=\\\"text\\\"\\n\\tchecked=\\\"enabled\\\"\\n\\tunchecked=\\\"disabled\\\"\\n\\tdefault=\\\"enabled\\\">\\n&#32;\\n''{{!!caption}}''\\n\u003C/$checkbox>\u003C/td>\u003Ctd>\\n\\n\u003C$transclude field='description' />\\n\\n\u003C/td>\u003C/tr>\u003C/$list>\\n\u003C/tbody>\u003C/table>\u003C/div>\\n\"\n        },\n        \"$:/plugins/flibbles/relink-titles/language/Caption\": {\n            \"title\": \"$:/plugins/flibbles/relink-titles/language/Caption\",\n            \"text\": \"Titles\"\n        },\n        \"$:/plugins/flibbles/relink-titles/language/Directory/Caption\": {\n            \"title\": \"$:/plugins/flibbles/relink-titles/language/Directory/Caption\",\n            \"text\": \"Rename subdirectories\"\n        },\n        \"$:/plugins/flibbles/relink-titles/language/Directory/Description\": {\n            \"title\": \"$:/plugins/flibbles/relink-titles/language/Directory/Description\",\n            \"text\": \"For wikis set up hierarchically using `/`, like a filesystem. This option will update all tiddlers nested inside the target tiddler. i.e. `fromTiddler/path/file` becomes `toTiddler/path/file`.\"\n        },\n        \"$:/plugins/flibbles/relink-titles/language/Lookup/Caption\": {\n            \"title\": \"$:/plugins/flibbles/relink-titles/language/Lookup/Caption\",\n            \"text\": \"Lookup tiddlers\"\n        },\n        \"$:/plugins/flibbles/relink-titles/language/Help\": {\n            \"title\": \"$:/plugins/flibbles/relink-titles/language/Help\",\n            \"text\": \"See the \u003Ca href={{{ [{$:/plugins/flibbles/relink-titles!!demo}addsuffix[#Plugins/Titles]] }}} class=\\\"tc-tiddlylink-external\\\">//Relink-titles// documentation page\u003C/a> for details.\"\n        },\n        \"$:/plugins/flibbles/relink-titles/readme\": {\n            \"title\": \"$:/plugins/flibbles/relink-titles/readme\",\n            \"text\": \"Highly customizable relinking of tiddler titles //related// to the renamed tiddler.\\n\\n* Rename a hierarchy of subtiddlers when renaming a root tiddler.\\n* Make custom filter rules to rename other tiddlers the way you want when Relinking.\\n* Integrates with other plugins for plugin-specific rules.\\n\\nSee \u003Ca href={{$:/plugins/flibbles/relink-titles!!source}} class=\\\"tc-tiddlylink-external\\\">the tw5-relink website\u003C/a> for more details and examples.\\n\\n{{$:/core/images/warning}} ''Warning:'' You must use //Relink// v1.10.2 or greater with this, or this plugin may delete some tiddler bodies while trying to relink titles.\\n\"\n        },\n        \"$:/plugins/flibbles/relink-titles/relinkoperations/title.js\": {\n            \"title\": \"$:/plugins/flibbles/relink-titles/relinkoperations/title.js\",\n            \"text\": \"/*\\\\\\nmodule-type: relinkoperator\\ntitle: $:/plugins/flibbles/relink-titles/relinkoperations/title.js\\ntype: application/javascript\\n\\nRenames tiddlers which have titles derived from fromTitle. Then it makes\\nsure that those tiddlers are properly relinked too.\\n\\n\\\\*/\\n\\n/*jslint node: false, browser: true */\\n/*global $tw: false */\\n\\\"use strict\\\";\\n\\nvar configPrefix = \\\"$:/config/flibbles/relink-titles/relink/\\\";\\nvar utils = require('$:/plugins/flibbles/relink/js/utils.js');\\n// This is using hotDirectories, which is a deprecated feature. It should be\\n// using the $:/config/flibbles/relink/{cateogory} directory which would be\\n// automatically maintained and regenerated.\\n// Maybe in time I'll get around to migrating this, but no need to complicate\\n// things now with changes that would require migration, and that would\\n// have no outward effect.\\nutils.getContext('whitelist').hotDirectories.push(configPrefix);\\n\\nvar titleRules = Object.create(null);\\n$tw.modules.forEachModuleOfType('relinktitlesrule', function(title, module) {\\n\\ttitleRules[title] = module;\\n});\\n\\nexports.name = 'title';\\n\\nexports.report = function(tiddler, callback, options) {\\n\\tvar cache = getCache(options),\\n\\t\\trules = cache.rules;\\n\\tfor (var i = 0; i \u003C rules.length; i++) {\\n\\t\\trules[i].report(tiddler.fields.title, function(title, blurb, style) {\\n\\t\\t\\tcallback(title, blurb ? ('title: ' + blurb) : 'title', style);\\n\\t\\t}, options);\\n\\t}\\n};\\n\\nexports.relink = function(tiddler, fromTitle, toTitle, changes, options) {\\n\\tvar cache = getCache(options),\\n\\t\\ttitle = tiddler.fields.title;\\n\\tif (!cache.touched[title]) {\\n\\t\\tvar rules = cache.rules;\\n\\t\\tfor (var i = 0; i \u003C rules.length; i++) {\\n\\t\\t\\tvar rule = rules[i];\\n\\t\\t\\tvar entry = rule.relink(title, fromTitle, toTitle, options);\\n\\t\\t\\tif (entry) {\\n\\t\\t\\t\\tvar result = entry.output;\\n\\t\\t\\t\\tif (result && (result !== title)) {\\n\\t\\t\\t\\t\\tif (options.wiki.getTiddler(result) || cache.touched[result]) {\\n\\t\\t\\t\\t\\t\\t// There's already a tiddler there. We won't clobber it.\\n\\t\\t\\t\\t\\t\\tentry.impossible = true;\\n\\t\\t\\t\\t\\t\\tentry.output = undefined;\\n\\t\\t\\t\\t\\t}\\n\\t\\t\\t\\t\\tcache.touched[result] = true;\\n\\t\\t\\t\\t}\\n\\t\\t\\t\\t// Record that we've touched this one, so we only touch it once.\\n\\t\\t\\t\\t// Both its prior and latter. Neither should be touched again.\\n\\t\\t\\t\\tcache.touched[title] = true;\\n\\t\\t\\t\\tchanges.title = entry;\\n\\t\\t\\t\\tbreak;\\n\\t\\t\\t}\\n\\t\\t}\\n\\t}\\n};\\n\\nfunction getCache(options) {\\n\\treturn utils.getCacheForRun(options, 'titles', function() {\\n\\t\\treturn {\\n\\t\\t\\trules: getRules(options.wiki),\\n\\t\\t\\ttouched: Object.create(null)\\n\\t\\t};\\n\\t});\\n};\\n\\nfunction getRules(wiki) {\\n\\tvar activeRules = [];\\n\\tfor (var rule in titleRules) {\\n\\t\\tvar configTiddler = wiki.getTiddler(configPrefix + rule);\\n\\t\\tif (!configTiddler || configTiddler.fields.text !== \\\"disabled\\\") {\\n\\t\\t\\tactiveRules.push(titleRules[rule]);\\n\\t\\t}\\n\\t}\\n\\treturn activeRules;\\n};\\n\",\n            \"module-type\": \"relinkoperator\",\n            \"type\": \"application/javascript\"\n        },\n        \"$:/plugins/flibbles/relink-titles/rules/directory\": {\n            \"title\": \"$:/plugins/flibbles/relink-titles/rules/directory\",\n            \"text\": \"/*\\\\\\ncaption: {{$:/plugins/flibbles/relink-titles/language/Directory/Caption}}\\ndescription: {{$:/plugins/flibbles/relink-titles/language/Directory/Description}}\\nmodule-type: relinktitlesrule\\ntitle: $:/plugins/flibbles/relink-titles/rules/directory\\ntype: application/javascript\\n\\nHandles subdirectory renaming.\\n\\n\\\\*/\\n\\n/*jslint node: false, browser: true */\\n/*global $tw: false */\\n\\\"use strict\\\";\\n\\nexports.name = 'directory';\\n\\n/**The report returns all parent directories of a given title which exist.\\n */\\nexports.report = function(title, callback, options) {\\n\\tvar index = -1;\\n\\twhile ((index = title.indexOf('/', index+1)) >= 0) {\\n\\t\\tvar dir = title.substr(0, index);\\n\\t\\tcallback(dir, '.' + title.substr(index), {soft: true});\\n\\t}\\n};\\n\\n/**The relink returns the new title (if any) derived from title for a given\\n * rename of fromTitle to toTitle.\\n */\\nexports.relink = function(title, fromTitle, toTitle, options) {\\n\\tvar length = fromTitle.length;\\n\\tif (title.charAt(length) === '/' && title.substr(0, length) === fromTitle) {\\n\\t\\treturn {output: toTitle + title.substr(length)};\\n\\t}\\n\\treturn undefined;\\n};\\n\",\n            \"caption\": \"{{$:/plugins/flibbles/relink-titles/language/Directory/Caption}}\",\n            \"description\": \"{{$:/plugins/flibbles/relink-titles/language/Directory/Description}}\",\n            \"module-type\": \"relinktitlesrule\",\n            \"type\": \"application/javascript\"\n        },\n        \"$:/plugins/flibbles/relink-titles/language/Lookup/Description\": {\n            \"title\": \"$:/plugins/flibbles/relink-titles/language/Lookup/Description\",\n            \"text\": \"This option updates all configuration tiddlers which relate to target tiddlers either through fixed prefixes or suffixes, i.e. `$:/config/Buttons/Visibility/fromFile` becomes `$:/config/Buttons/Visibility/toFile` when \\\"fromFile\\\" is renamed.\\n\\nEach line corresponds to a pattern, where `$(currentTiddler)$` would be the name of the tiddler being renamed, and `$(*)$` matches with anything.\\n\\n\u003C$edit-text\\n\\ttiddler=\\\"$:/config/flibbles/relink-titles/lookup/patterns\\\"\\n\\ttag=\\\"textarea\\\"\\n/>\\n\"\n        },\n        \"$:/config/flibbles/relink-titles/lookup/patterns\": {\n            \"title\": \"$:/config/flibbles/relink-titles/lookup/patterns\",\n            \"text\": \"$:/config/$(*)$/Visibility/$(currentTiddler)$\\n\"\n        },\n        \"$:/plugins/flibbles/relink-titles/rules/lookup\": {\n            \"title\": \"$:/plugins/flibbles/relink-titles/rules/lookup\",\n            \"text\": \"/*\\\\\\ncaption: {{$:/plugins/flibbles/relink-titles/language/Lookup/Caption}}\\ndescription: {{$:/plugins/flibbles/relink-titles/language/Lookup/Description}}\\nmodule-type: relinktitlesrule\\ntitle: $:/plugins/flibbles/relink-titles/rules/lookup\\ntype: application/javascript\\n\\nHandles setting tiddlers which are derived from other tiddlers, like how\\n\\n```\\n$:/config/PageControlButtons/Visibility/$(currentTiddler)$\\n```\\n\\nset the visibility for $(currentTiddler)$\\n\\n\\\\*/\\n\\n\\\"use strict\\\";\\n\\nexports.name = 'lookup';\\n\\nvar patternTiddler = \\\"$:/config/flibbles/relink-titles/lookup/patterns\\\";\\nvar anyMatcher = /\\\\$\\\\((?:\\\\*|currentTiddler)\\\\)\\\\$/g;\\n\\nexports.report = function(targetTitle, callback, options) {\\n\\tvar patterns = getPatterns(options.wiki);\\n\\tfor (var i = 0; i \u003C patterns.length; i++) {\\n\\t\\tvar pattern = patterns[i];\\n\\t\\tvar index = 0;\\n\\t\\tvar results = match(pattern, targetTitle);\\n\\t\\tif (results) {\\n\\t\\t\\tvar blurb = pattern.string.replace(anyMatcher, function(match) {\\n\\t\\t\\t\\tindex++;\\n\\t\\t\\t\\tif (match === \\\"$(*)$\\\") {\\n\\t\\t\\t\\t\\treturn results[index];\\n\\t\\t\\t\\t} else { // must be \\\"$(currentTiddler)$\\\"\\n\\t\\t\\t\\t\\treturn \\\"...\\\";\\n\\t\\t\\t\\t}\\n\\t\\t\\t});\\n\\t\\t\\tcallback(results.title, blurb);\\n\\t\\t}\\n\\t}\\n};\\n\\nexports.relink = function(targetTitle, fromTitle, toTitle, options) {\\n\\tvar patterns = getPatterns(options.wiki);\\n\\tfor (var i = 0; i \u003C patterns.length; i++) {\\n\\t\\tvar pattern = patterns[i];\\n\\t\\tvar results = match(pattern, targetTitle, fromTitle);\\n\\t\\tif (results) {\\n\\t\\t\\tvar groupIndex = 0;\\n\\t\\t\\t// Make all the correct substitutions to create the new title\\n\\t\\t\\tvar output = pattern.string.replace(anyMatcher, function(match) {\\n\\t\\t\\t\\tgroupIndex++;\\n\\t\\t\\t\\tif (match === \\\"$(*)$\\\") {\\n\\t\\t\\t\\t\\treturn results[groupIndex];\\n\\t\\t\\t\\t} else { // must be \\\"$(currentTiddler)$\\\"\\n\\t\\t\\t\\t\\treturn toTitle;\\n\\t\\t\\t\\t}\\n\\t\\t\\t});\\n\\t\\t\\treturn {output: output};\\n\\t\\t}\\n\\t}\\n\\treturn undefined;\\n};\\n\\nfunction match(pattern, string, matchTitle) {\\n\\tvar results = pattern.matcher.exec(string);\\n\\tif (results) {\\n\\t\\t// It superficially matches, but we need to make sure all the right\\n\\t\\t// groups match too.\\n\\t\\tfor (var j = 0; j \u003C pattern.groups.length; j++) {\\n\\t\\t\\tvar index = pattern.groups[j];\\n\\t\\t\\tif (matchTitle === undefined) {\\n\\t\\t\\t\\t// It doesn't matter what matchTitle is, as long as all\\n\\t\\t\\t\\t// groups match the same thing.\\n\\t\\t\\t\\tmatchTitle = results[index];\\n\\t\\t\\t} else if (results[index] !== matchTitle) {\\n\\t\\t\\t\\treturn null;\\n\\t\\t\\t}\\n\\t\\t}\\n\\t\\tresults.title = matchTitle;\\n\\t}\\n\\treturn results;\\n};\\n\\nfunction getPatterns(wiki) {\\n\\treturn wiki.getCacheForTiddler(patternTiddler, \\\"relink-titles\\\", function() {\\n\\t\\tvar text = wiki.getTiddlerText(patternTiddler);\\n\\t\\tvar matchers = []\\n\\t\\tif (text) {\\n\\t\\t\\tvar array = text.split('\\\\n');\\n\\t\\t\\tfor (var i = 0; i \u003C array.length; i++) {\\n\\t\\t\\t\\tvar pattern = formPatternFromString(array[i]);\\n\\t\\t\\t\\tif (pattern) {\\n\\t\\t\\t\\t\\tmatchers.push(pattern);\\n\\t\\t\\t\\t}\\n\\t\\t\\t}\\n\\t\\t}\\n\\t\\treturn matchers;\\n\\t});\\n};\\n\\nfunction formPatternFromString(string) {\\n\\tvar groupIndex = 1;\\n\\tvar matchingGroups = [];\\n\\tstring = $tw.utils.trim(string);\\n\\tvar parts = string.split(\\\"$(currentTiddler)$\\\");\\n\\tif (parts.length \u003C= 1) {\\n\\t\\t// $(currentTiddler)$ must not have been there\\n\\t\\treturn null;\\n\\t}\\n\\tfor (var j = 0; j \u003C parts.length; j++) {\\n\\t\\t// Split it up by the wildcards\\n\\t\\tvar sections = parts[j].split(\\\"$(*)$\\\");\\n\\t\\tfor (var k = 0; k \u003C sections.length; k++) {\\n\\t\\t\\tsections[k] = $tw.utils.escapeRegExp(sections[k]);\\n\\t\\t}\\n\\t\\tparts[j] = sections.join(\\\"(.*)\\\");\\n\\t\\t// If there are 3 sections, then there is 2 $(*)$, so the index\\n\\t\\t// must skip them. etc...\\n\\t\\tgroupIndex += sections.length-1;\\n\\t\\tif (j \u003C parts.length-1) {\\n\\t\\t\\t// If there are 3 parts, that means 2 $(currentTiddler)$, and\\n\\t\\t\\t// so we skip the last part\\n\\t\\t\\tmatchingGroups.push(groupIndex);\\n\\t\\t\\tgroupIndex++;\\n\\t\\t}\\n\\t}\\n\\treturn {\\n\\t\\tstring: string,\\n\\t\\tgroups: matchingGroups,\\n\\t\\tmatcher: new RegExp(\\\"^\\\" + parts.join(\\\"(.*)\\\") + \\\"$\\\")\\n\\t};\\n};\\n\",\n            \"caption\": \"{{$:/plugins/flibbles/relink-titles/language/Lookup/Caption}}\",\n            \"description\": \"{{$:/plugins/flibbles/relink-titles/language/Lookup/Description}}\",\n            \"module-type\": \"relinktitlesrule\",\n            \"type\": \"application/javascript\"\n        }\n    }\n}"},
{"title":"$:/plugins/sq/editor-autolist","name":"Editor AutoList","description":"Editor extension to automatically continue lists","author":"Saq Imtiaz","core-version":">=5.2.0","plugin-priority":"0","list":"readme","version":"0.1.14","plugin-type":"plugin","dependents":"","type":"application/json","text":"{\"tiddlers\":{\"$:/plugins/sq/editor-autolist/editor-operation-autolist.js\":{\"title\":\"$:/plugins/sq/editor-autolist/editor-operation-autolist.js\",\"text\":\"/*\\\\\\ntitle: $:/plugins/sq/editor-autolist/editor-operation-autolist.js\\ntype: application/javascript\\nmodule-type: texteditoroperation\\nText editor operation to automate syntax for lists\\n\\\\*/\\n(function(){\\n\\n\\nfunction getListLevelInfoForLine(state,index,lineContent) {\\n\\tif(index && !state.allLines[index]) {\\n\\t\\treturn null;\\n\\t}\\n\\tconst listPrefixRegex = /^((\\\\*|#)+)(.*)$/;\\n\\tconst match = (index!= null ? state.allLines[index] : lineContent).match(listPrefixRegex);\\n\\treturn match && match[1] ? {listPrefix: match[1], level: match[1].length, listType: match[2], content: match[3]} : null;\\n}\\n\\nexports[\\\"autolist\\\"] = function(event,operation) {\\n\\t\\n\\tlet state = Object.create(null),\\n\\t\\tmode = event.paramObject? event.paramObject.mode : undefined,\\n\\t\\tlistPrefixRegex = /^(?:(?:\\\\*|#)+).*/\\n\\t\\n\\tif(mode === \\\"newline\\\") {\\n\\t\\tlet firstLineStart = $tw.utils.findPrecedingLineBreak(operation.text,operation.selStart),\\n\\t\\t\\tfirstLineEnd = $tw.utils.findFollowingLineBreak(operation.text,operation.selStart),\\n\\t\\t\\tfirstLine = operation.text.substring(firstLineStart,firstLineEnd),\\n\\t\\t\\temptyListItemRegex = /^((\\\\*|#)+)$/;\\n\\n\\t\\tif(listPrefixRegex.test(firstLine)) {\\n\\t\\t\\t// we are on a list line\\n\\t\\t\\tif(emptyListItemRegex.test(firstLine.trimEnd())){\\n\\t\\t\\t\\t// we have an empty list line with no content so terminate the list\\n\\t\\t\\t\\toperation.replacement = \\\"\\\\n\\\";\\n\\t\\t\\t\\toperation.cutStart = firstLineStart;\\n\\t\\t\\t\\toperation.cutEnd = operation.selEnd;\\n\\t\\t\\t\\toperation.newSelStart = firstLineStart + 1;\\n\\t\\t\\t\\toperation.newSelEnd = operation.newSelStart;\\n\\t\\t\\t} else {\\n\\t\\t\\t\\t//list line with content, continue list on next line\\n\\t\\t\\t\\tlet listItemInfo = getListLevelInfoForLine(state,null,firstLine);\\n\\t\\t\\t\\tif(operation.selStart === firstLineStart && operation.selStart === operation.selEnd) {\\n\\t\\t\\t\\t\\t//cursor is at the beginning of the line, add a new list item before this one at the same level and prefix\\n\\t\\t\\t\\t\\toperation.replacement = `${listItemInfo.listPrefix} \\\\n`;\\n\\t\\t\\t\\t\\toperation.newSelStart = operation.selStart = operation.selStart + listItemInfo.listPrefix.length + 1;\\n\\t\\t\\t\\t\\toperation.newSelEnd = operation.newSelStart;\\n\\t\\t\\t\\t} else {\\n\\t\\t\\t\\t\\toperation.replacement = `\\\\n${listItemInfo.listPrefix} `;\\n\\t\\t\\t\\t\\toperation.newSelStart = operation.selStart + listItemInfo.listPrefix.length + 2;\\n\\t\\t\\t\\t\\toperation.newSelEnd = operation.newSelStart;\\t\\t\\t\\t\\n\\t\\t\\t\\t}\\n\\t\\t\\t\\toperation.cutStart = operation.selStart;\\n\\t\\t\\t\\toperation.cutEnd = operation.selEnd;\\n\\t\\t\\t\\t// check for trailing whitespace after selEnd that we want to remove\\n\\t\\t\\t\\tif(!operation.text.substring(operation.selEnd,firstLineEnd).trim().length) {\\n\\t\\t\\t\\t\\toperation.cutEnd = firstLineEnd;\\n\\t\\t\\t\\t}\\n\\n\\t\\t\\t}\\n\\t\\t} else {\\n\\t\\t\\t// selection does not start on a list line, so we need to manually add a linebreak for lines not starting with list markup\\n\\t\\t\\toperation.replacement = \\\"\\\\n\\\";\\n\\t\\t\\toperation.cutStart = operation.selStart;\\n\\t\\t\\toperation.cutEnd = operation.selEnd;\\n\\t\\t\\toperation.newSelStart = operation.selStart + 1;\\n\\t\\t\\toperation.newSelEnd = operation.newSelStart;\\n\\t\\t}\\n\\t} else if(mode === \\\"indent\\\" || mode === \\\"unindent\\\") {\\n\\t\\tlet selModifier;\\n\\t\\tstate.startSelectedLines = $tw.utils.findPrecedingLineBreak(operation.text,operation.selStart);\\n\\t\\t// if there is a selection move the marker back by one to make sure we don't include a trailing line break\\n\\t\\tlet endMarker = (operation.selStart !== operation.selEnd) ? operation.selEnd - 1 : operation.selEnd;\\n\\t\\tstate.endSelectedLines = $tw.utils.findFollowingLineBreak(operation.text,endMarker);\\n\\t\\tstate.selectedText = operation.text.substring(state.startSelectedLines,state.endSelectedLines);\\t\\t\\n\\t\\tstate.selectedLines = state.selectedText.split(\\\"\\\\n\\\");\\n\\t\\tstate.selectedLinesCount = state.selectedLines.length;\\n\\t\\tstate.allLines = operation.text.split(\\\"\\\\n\\\");\\n\\t\\tstate.allLinesCount = state.allLines.length;\\n\\t\\tstate.prefixText = operation.text.substring(0,state.startSelectedLines-1);\\n\\t\\tstate.suffixText = operation.text.substring(state.endSelectedLines+1);\\n\\t\\tstate.prefixLinesCount = state.prefixText.length ? state.prefixText.split(\\\"\\\\n\\\").length : 0;\\n\\t\\tstate.suffixLinesCount = state.suffixText.length ? state.suffixText.split(\\\"\\\\n\\\").length : 0;\\n\\t\\tstate.selectedLinesInfo = state.selectedLines.map((line,index,selLines) => {\\n\\t\\t\\treturn getListLevelInfoForLine(state,index + state.prefixLinesCount);\\n\\t\\t});\\n\\t\\t//non list items will have null value for info in selectedLinesInfo\\n\\t\\tstate.modifiedLines = Array(state.selectedLines.length).fill(\\\"\\\");\\n\\t\\tif(mode === \\\"indent\\\"){\\n\\t\\t\\tlet prevListItemInfo,\\n\\t\\t\\t\\tlistItemInfo,\\n\\t\\t\\t\\tprevNewListType;\\n\\t\\t\\tselModifier = 1;\\n\\t\\t\\tstate.selectedLines.forEach(function(element,index,array) {\\n\\t\\t\\t\\t/// exclude lines that dont start with a list prefix, they will have listItemInfo as null\\n\\t\\t\\t\\tlistItemInfo = listItemInfo || getListLevelInfoForLine(state,index + state.prefixLinesCount); // use from selectedLinesInfo XXX\\n\\t\\t\\t\\tif(!listItemInfo) {\\n\\t\\t\\t\\t\\t// not a list item so put the original text in modifiedLines\\n\\t\\t\\t\\t\\tstate.modifiedLines[index] = element;\\n\\t\\t\\t\\t\\treturn;\\n\\t\\t\\t\\t}\\n\\t\\t\\t\\tlet\\tnewlistType,\\n\\t\\t\\t\\t\\tnextListItemInfo;\\n\\t\\t\\t\\t//better if we were changing the new levels and prefixes for selected lines somewhere and I could check against that\\n\\t\\t\\t\\tif(prevListItemInfo && prevListItemInfo.level === listItemInfo.level && prevListItemInfo.listPrefix === listItemInfo.listPrefix) {\\n\\t\\t\\t\\t\\tnewlistType = prevNewListType;\\n\\t\\t\\t\\t} else {\\n\\t\\t\\t\\t\\tprevListItemInfo = prevListItemInfo || getListLevelInfoForLine(state, index -1 + state.prefixLinesCount);\\n\\t\\t\\t\\t\\tif(prevListItemInfo && prevListItemInfo.level >= listItemInfo.level + 1) {\\n\\t\\t\\t\\t\\t\\tnewlistType = prevListItemInfo.listPrefix[listItemInfo.level];\\n\\t\\t\\t\\t\\t} else {\\n\\t\\t\\t\\t\\t\\tnextListItemInfo = getListLevelInfoForLine(state,index + 1 + state.prefixLinesCount);\\n\\t\\t\\t\\t\\t\\tif(nextListItemInfo && nextListItemInfo.level >= listItemInfo.level + 1) {\\n\\t\\t\\t\\t\\t\\t\\tnewlistType = nextListItemInfo.listPrefix[listItemInfo.level];\\n\\t\\t\\t\\t\\t\\t} else if(nextListItemInfo) {\\n\\t\\t\\t\\t\\t\\t\\t// as long as there is a next list item in the SELECTION that is the same level and prefix, keep going further\\n\\t\\t\\t\\t\\t\\t\\tlet selIndex = index + 1,\\n\\t\\t\\t\\t\\t\\t\\t\\tnextInfo = state.selectedLinesInfo[selIndex];\\n\\t\\t\\t\\t\\t\\t\\twhile(nextInfo && nextInfo.level === listItemInfo.level && nextInfo.listType === listItemInfo.listType) {\\n\\t\\t\\t\\t\\t\\t\\t\\tselIndex++;\\n\\t\\t\\t\\t\\t\\t\\t\\tnextInfo = state.selectedLinesInfo[selIndex];\\n\\t\\t\\t\\t\\t\\t\\t}\\n\\t\\t\\t\\t\\t\\t\\tnextInfo = getListLevelInfoForLine(state,selIndex + state.prefixLinesCount);\\n\\t\\t\\t\\t\\t\\t\\tif(nextInfo && nextInfo.level >= listItemInfo.level + 1) {\\n\\t\\t\\t\\t\\t\\t\\t\\tnewlistType = nextInfo.listPrefix[listItemInfo.level];\\n\\t\\t\\t\\t\\t\\t\\t}\\n\\t\\t\\t\\t\\t\\t}\\n\\t\\t\\t\\t\\t}\\t\\t\\t\\t\\n\\t\\t\\t\\t}\\n\\t\\t\\t\\tif(!newlistType) {\\n\\t\\t\\t\\t\\tnewlistType = listItemInfo.listType;\\n\\t\\t\\t\\t}\\n\\t\\t\\t\\tstate.modifiedLines[index] = `${listItemInfo.listPrefix}${newlistType}${listItemInfo.content}`;\\n\\t\\t\\t\\t//console.log(`${listItemInfo.content} => ${newlistType} | `,state.modifiedLines[index]);\\n\\t\\t\\t\\tprevListItemInfo = listItemInfo;\\n\\t\\t\\t\\tlistItemInfo = nextListItemInfo;\\n\\t\\t\\t\\tprevNewListType = newlistType;\\n\\t\\t\\t},this);\\t\\t\\t\\n\\t\\t} else if(mode === \\\"unindent\\\") {\\n\\t\\t\\tselModifier = -1;\\n\\t\\t\\tstate.selectedLines.forEach(function(element,index,array) {\\n\\t\\t\\t\\tlet listItemInfo = state.selectedLinesInfo[index];\\n\\t\\t\\t\\tif(listItemInfo) {\\n\\t\\t\\t\\t\\t//remove the last character of the listPrefix if its a list item\\n\\t\\t\\t\\t\\tstate.modifiedLines[index] = `${listItemInfo.listPrefix.slice(0,-1)}${listItemInfo.content}`;\\n\\t\\t\\t\\t} else {\\n\\t\\t\\t\\t\\t// if its not a list item then use the original text\\n\\t\\t\\t\\t\\tstate.modifiedLines[index] = element;\\n\\t\\t\\t\\t}\\n\\t\\t\\t});\\n\\t\\t}\\n\\t\\tlet replacement = state.modifiedLines.join(\\\"\\\\n\\\");\\n\\t\\tif(replacement) {\\n\\t\\t\\toperation.replacement = state.modifiedLines.join(\\\"\\\\n\\\");\\n\\t\\t\\toperation.cutStart = state.startSelectedLines;\\n\\t\\t\\toperation.cutEnd = state.endSelectedLines;\\n\\t\\t\\tif(operation.selStart !== operation.selEnd) {\\n\\t\\t\\t\\toperation.newSelStart = state.startSelectedLines;\\n\\t\\t\\t\\toperation.newSelEnd = state.startSelectedLines + operation.replacement.length;\\n\\t\\t\\t} else {\\n\\t\\t\\t\\t// we did not have a selection to start so just modify the selection start and end to accomodate the change in indentation\\n\\t\\t\\t\\toperation.newSelEnd = operation.selEnd + selModifier;\\n\\t\\t\\t\\toperation.newSelStart = operation.newSelEnd;\\n\\t\\t\\t}\\n\\t\\t}\\n\\t} \\n};\\n\\n})();\\n\",\"type\":\"application/javascript\",\"module-type\":\"texteditoroperation\"},\"$:/plugins/sq/editor-autolist/icon\":{\"title\":\"$:/plugins/sq/editor-autolist/icon\",\"text\":\"\u003Csvg viewBox=\\\"31.626 273.967 117.45 122.86\\\" height=\\\"22pt\\\" width=\\\"22pt\\\">\\n\u003Cpath d=\\\"M39.846 273.967h101.02a8.2 8.2 0 0 1 5.81 2.4 8.2 8.2 0 0 1 2.4 5.81v106.44a8.2 8.2 0 0 1-2.4 5.81 8.2 8.2 0 0 1-5.81 2.4H39.846a8.2 8.2 0 0 1-5.81-2.4 8.109 8.109 0 0 1-2.41-5.8v-106.44c0-2.27.92-4.34 2.4-5.82a8.224 8.224 0 0 1 5.82-2.4Zm101.02 7.08H39.846c-.32 0-.61.13-.82.34-.21.21-.34.5-.34.82v106.44c0 .32.13.61.34.82.21.21.5.34.82.34h101.02c.32 0 .61-.13.82-.34.21-.21.34-.5.34-.82v-106.44c0-.32-.13-.61-.34-.82-.22-.21-.51-.34-.82-.34Z\\\"/>\\n\u003Cpath d=\\\"m107.502 333.58 3.045 14.498 14.495 3.168-12.87 7.372 1.458 14.74-11-9.942-13.59 5.944 6.073-13.518-9.864-11.068 14.755 1.588 7.498-12.783Zm8.267 36.294 12.588 12.783a.789.789 0 0 0 1.11.005l4.891-4.84a.786.786 0 0 0 .005-1.109l-17.206-17.416c-.302-.307-1.1-.434-1.11-.005l-.278 10.582ZM67.605 301.084c-3.678-.637-5.255-4.833-2.837-7.555a4.91 4.91 0 0 1 2.837-1.56h53.098c3.675.636 5.249 4.832 2.834 7.553a4.902 4.902 0 0 1-2.834 1.562H67.605ZM53.025 291.364c3.973 0 6.457 4.05 4.47 7.29-1.986 3.241-6.954 3.241-8.94 0a4.642 4.642 0 0 1-.692-2.43c0-2.684 2.311-4.86 5.162-4.86ZM67.605 317.255c-3.678-.638-5.255-4.834-2.837-7.556a4.91 4.91 0 0 1 2.837-1.56h53.098c3.675.636 5.249 4.832 2.834 7.553a4.909 4.909 0 0 1-2.834 1.563H67.605ZM53.025 307.534c3.973 0 6.457 4.05 4.47 7.29-1.986 3.241-6.954 3.241-8.94 0a4.642 4.642 0 0 1-.692-2.43c0-2.684 2.311-4.86 5.162-4.86ZM66.214 333.579c-2.434-.638-3.477-4.834-1.877-7.555.48-.818 1.145-1.371 1.877-1.561h35.141c2.432.636 3.474 4.833 1.876 7.553-.48.818-1.144 1.371-1.876 1.563H66.214ZM52.985 323.858c3.973 0 6.457 4.05 4.469 7.291-1.985 3.24-6.953 3.24-8.939 0a4.645 4.645 0 0 1-.692-2.43c0-2.684 2.311-4.861 5.162-4.861Z\\\"/>\\n\u003C/svg>\"},\"$:/plugins/sq/editor-autolist/indent.svg\":{\"title\":\"$:/plugins/sq/editor-autolist/indent.svg\",\"text\":\"\u003Csvg height=\\\"22pt\\\" width=\\\"22pt\\\" viewBox=\\\"0 0 122.88 95.07\\\">\u003Cpath d=\\\"M46.06 26.43h76.82v15.8H46.06v-15.8Zm76.82 52.85H.01L0 95.07h122.88V79.28Zm0-26.43H46.54v15.8h76.34v-15.8Zm0-52.85H.02v15.8h122.87L122.88 0Z\\\"/>\u003Cpath d=\\\"m7.497 47.851 23.24-22.35v44.7l-23.24-22.35Z\\\" transform=\\\"rotate(180 19.117 47.851)\\\"/>\u003C/svg>\"},\"$:/plugins/sq/editor-autolist/EditorToolbar/autolist-indent\":{\"title\":\"$:/plugins/sq/editor-autolist/EditorToolbar/autolist-indent\",\"condition\":\"[\u003CtargetTiddler>!has[type]] [\u003CtargetTiddler>type[text/vnd.tiddlywiki]]\",\"icon\":\"$:/plugins/sq/editor-autolist/indent.svg\",\"shortcuts\":\"((autolist-indent))\",\"tags\":\"$:/tags/EditorToolbar\",\"list-after\":\"$:/core/ui/EditorToolbar/list-number\",\"caption\":\"Indent list items\",\"description\":\"Indent list items\",\"text\":\"\u003C$action-sendmessage\\n\\t$message=\\\"tm-edit-text-operation\\\"\\n\\t$param=\\\"autolist\\\"\\n\\tmode=\\\"indent\\\"\\n/>\\n\"},\"$:/plugins/sq/editor-autolist/EditorToolbar/autolist-newline\":{\"title\":\"$:/plugins/sq/editor-autolist/EditorToolbar/autolist-newline\",\"button-classes\":\"sq-text-editor-btn-hidden\",\"condition\":\"[\u003CtargetTiddler>!has[type]] [\u003CtargetTiddler>type[text/vnd.tiddlywiki]]\",\"icon\":\"$:/core/images/list-bullet\",\"shortcuts\":\"((autolist-newline))\",\"tags\":\"$:/tags/EditorToolbar\",\"text\":\"\u003C$action-sendmessage\\n\\t$message=\\\"tm-edit-text-operation\\\"\\n\\t$param=\\\"autolist\\\"\\n\\tmode=\\\"newline\\\"\\n/>\\n\"},\"$:/plugins/sq/editor-autolist/EditorToolbar/autolist-unindent\":{\"title\":\"$:/plugins/sq/editor-autolist/EditorToolbar/autolist-unindent\",\"condition\":\"[\u003CtargetTiddler>!has[type]] [\u003CtargetTiddler>type[text/vnd.tiddlywiki]]\",\"icon\":\"$:/plugins/sq/editor-autolist/unindent.svg\",\"shortcuts\":\"((autolist-unindent))\",\"tags\":\"$:/tags/EditorToolbar\",\"list-after\":\"$:/core/ui/EditorToolbar/list-number\",\"caption\":\"Unindent list items\",\"description\":\"Unindent list items\",\"text\":\"\u003C$action-sendmessage\\n\\t$message=\\\"tm-edit-text-operation\\\"\\n\\t$param=\\\"autolist\\\"\\n\\tmode=\\\"unindent\\\"\\n/>\\n\"},\"$:/plugins/sq/editor-autolist/readme\":{\"title\":\"$:/plugins/sq/editor-autolist/readme\",\"text\":\"@@color:red;''Experimental plugin - no support available. Use at your own risk.''@@\\n\\nAutomatically continue lists when creating new lines. Indent and unindent line(s) with list markup.\\n\\n!!Known limitations:\\n* no support for mixing block quotes with numbered and unordered lists.\\n* no support for classname syntax in list markup, e.g.: `*.myclass hello there`\\n* treats list items separated by empty lines are separate lists\"},\"$:/config/ShortcutInfo/autolist-indent\":{\"title\":\"$:/config/ShortcutInfo/autolist-indent\",\"text\":\"Indent a line in a list\"},\"$:/config/ShortcutInfo/autolist-newline\":{\"title\":\"$:/config/ShortcutInfo/autolist-newline\",\"text\":\"Add a newline and list markup if in a list\"},\"$:/config/ShortcutInfo/autolist-unindent\":{\"title\":\"$:/config/ShortcutInfo/autolist-unindent\",\"text\":\"Unindent a line in a list\"},\"$:/config/shortcuts/autolist-indent\":{\"title\":\"$:/config/shortcuts/autolist-indent\",\"text\":\"Tab\"},\"$:/config/shortcuts/autolist-newline\":{\"title\":\"$:/config/shortcuts/autolist-newline\",\"text\":\"Enter\"},\"$:/config/shortcuts/autolist-unindent\":{\"title\":\"$:/config/shortcuts/autolist-unindent\",\"text\":\"shift-Tab\"},\"$:/plugins/sq/editor-autolist/styles\":{\"title\":\"$:/plugins/sq/editor-autolist/styles\",\"tags\":\"$:/tags/Stylesheet\",\"text\":\".sq-text-editor-btn-hidden {\\n\\tdisplay: none;\\n}\"},\"$:/plugins/sq/editor-autolist/unindent.svg\":{\"title\":\"$:/plugins/sq/editor-autolist/unindent.svg\",\"text\":\"\u003Csvg height=\\\"22pt\\\" width=\\\"22pt\\\" viewBox=\\\"0 0 122.88 95.07\\\">\u003Cpath d=\\\"M46.06 26.43h76.82v15.8H46.06v-15.8zM7.47 48.01l23.24 22.35v-44.7L7.47 48.01zm115.41 31.27H.01L0 95.07h122.88V79.28zm0-26.43H46.54v15.8h76.34v-15.8zm0-52.85H.02v15.8h122.87L122.88 0z\\\" />\u003C/svg>\"}}}","revision":"0","bag":"default"},
{"title":"$:/plugins/sq/streams","name":"Streams","description":"Rapid data entry with a keyboard driven workflow. Divide content into smaller tiddlers as you write.","plugin-type":"plugin","plugin-priority":"1","author":"Saq Imtiaz","version":"1.2.24","core-version":">=5.1.23","list":"Settings CHANGELOG","source":"https://saqimtiaz.github.io/streams/","dependents":"$:/plugins/flibbles/relink","type":"application/json","text":"{\n    \"tiddlers\": {\n        \"$:/plugins/sq/streams/CHANGELOG\": {\n            \"title\": \"$:/plugins/sq/streams/CHANGELOG\",\n            \"text\": \"Release notes for the current release:\\n\\n{{$:/plugins/sq/streams/releasenotes}}\\n\\n[[Full changelog|https://saqimtiaz.github.io/streams/#CHANGELOG]] for Streams\\n\"\n        },\n        \"$:/plugins/sq/streams/Settings/config\": {\n            \"title\": \"$:/plugins/sq/streams/Settings/config\",\n            \"caption\": \"Configuration\",\n            \"text\": \"\\\\define sortBySettingsGroupFilter()\\n[get[settings-group]!is[blank]else[!general]] [get[settings-group-header]!is[blank]else[99]] +[join[]]\\n\\\\end\\n\\n\u003C$edit-text tiddler=\\\"$:/state/sq/streams/settings/search\\\" class=\\\"sq-search-input\\\" default=\\\"\\\" tag=\\\"input\\\" type=\\\"search\\\" placeholder=\\\"search...\\\"/>\\n\\n\u003Cdiv class=\\\"sq-list-group sq-list-group-box-shadow sq-list-stream-settings\\\">\\n\u003C$list filter=\\\"[all[shadows+tiddlers]prefix[$:/config/sq/streams]has[settings-template]]  +[search:title,caption,description{$:/state/sq/streams/settings/search}] +[sortsub\u003CsortBySettingsGroupFilter>]\\\">\\n\u003C$list filter={{{[{!!condition}!is[blank]] :else[{!!title}]}}} variable=\\\"list-condition\\\">\\n\u003Cdiv class=\\\"sq-list-group-item\\\">\\n\u003C$transclude tiddler={{!!settings-template}}/>\\n\u003C/div>\\n\u003C/$list>\\n\u003C/$list>\\n\u003C/div>\"\n        },\n        \"$:/plugins/sq/streams/Settings/shortcuts\": {\n            \"title\": \"$:/plugins/sq/streams/Settings/shortcuts\",\n            \"caption\": \"Shortcuts\",\n            \"text\": \"\\\\import $:/core/ui/ControlPanel/KeyboardShortcuts\\n\\n\u003Ctable>\\n\u003Ctbody>\\n\u003C$list filter=\\\"[all[shadows+tiddlers]prefix[$:/config/ShortcutInfo/streams-]removeprefix[$:/config/ShortcutInfo/]]\\\" variable=\\\"shortcutName\\\">\\n\u003C\u003Cshortcut-item>>\\n\u003C/$list>\\n\u003C/tbody>\\n\u003C/table>\"\n        },\n        \"$:/plugins/sq/streams/Settings\": {\n            \"title\": \"$:/plugins/sq/streams/Settings\",\n            \"tags\": \"$:/tags/ControlPanel\",\n            \"caption\": \"Streams settings\",\n            \"text\": \"\u003C\u003Ctabs \\\"$:/plugins/sq/streams/Settings/config $:/plugins/sq/streams/Settings/shortcuts\\\" \\\"$:/plugins/sq/streams/Settings/config\\\" \\\"$:/state/streams/settings/tabs\\\">>\\n\"\n        },\n        \"$:/plugins/sq/streams/action-macros\": {\n            \"title\": \"$:/plugins/sq/streams/action-macros\",\n            \"text\": \"\\\\whitespace trim\\n\\n\\\\define swiped-right-actions()\\n\u003C$list filter=\\\"[{$:/config/sq/streams/swipe-behaviour}match[contextmenu]]\\\" variable=\\\"_NULL\\\">\\n\u003C$action-setfield $tiddler=\u003C\u003Ccontextmenu-state>> $field=\\\"current\\\" $value=\u003C\u003Cdom-data-node-title>>/>\\n\u003C$action-setfield $tiddler=\u003C\u003Ccontextmenu-state>> $field=\\\"position\\\" $value={{$:/config/sq/streams/swipe-contextmenu-position}}/>\\n\u003C$action-popup $coords=\u003C\u003Ctv-popup-coords>> $state=\u003C\u003Ccontextmenu-state>>/>\\n\u003C/$list>\\n\u003C$list filter=\\\"[{$:/config/sq/streams/swipe-behaviour}match[indent]]\\\" variable=\\\"_NULL\\\">\\n\u003C$vars currentTiddler=\u003C\u003Cdom-data-node-title>>>\\n\u003C\u003Cindent-node-actions>>\\n\u003C/$vars>\\n\u003C/$list>\\n\\\\end\\n\\n\\\\define swiped-left-actions()\\n\u003C$list filter=\\\"[{$:/config/sq/streams/swipe-behaviour}match[indent]]\\\" variable=\\\"_NULL\\\">\\n\u003C$vars currentTiddler=\u003C\u003Cdom-data-node-title>>>\\n\u003C\u003Cunindent-node-actions>>\\n\u003C/$vars>\\n\u003C/$list>\\n\\\\end\\n\\n\\n\\\\define oncontext-menu-actions()\\n\u003C$action-setfield $tiddler=\u003C\u003Ccontextmenu-state>> $field=\\\"current\\\" $value=\u003C\u003Cdom-data-node-title>>/>\\n\u003C$action-setfield $tiddler=\u003C\u003Ccontextmenu-state>> $field=\\\"position\\\" $value=\\\"left\\\"/>\\n\u003C$action-popup $coords=\u003C\u003Ctv-popup-coords>> $state=\u003C\u003Ccontextmenu-state>>/>\\n\\\\end\\n\\n\\n\\\\define node-ctrl-btn-actions()\\n\u003C$list filter=\\\"[\u003Cdom-data-btn-role>match[stream-node-visibility]]\\\" variable=\\\"NULL\\\">\\n\u003C$action-setfield $tiddler=\u003C\u003Cdom-data-rowchildren-visibility-state>> text={{{ [\u003Cdom-data-rowchildren-visibility-state>get[text]match[hide]then[show]else[hide]] }}} />\\n\u003C/$list>\\n\u003C$list filter=\\\"[\u003Cdom-data-btn-role>match[stream-node-decorator]]\\\" variable=\\\"NULL\\\">\\n\u003C$action-navigate $to=\u003C\u003Cdom-data-node-title>>/>\\n\u003C/$list>\\n\\\\end\\n\\n\\n\\\\define toggle-row-edit-state()\\n\u003C$action-unselect/>\\n\u003C$list filter=\\\"[\u003Crow-edit-state>get[text]else[]!match\u003Cdom-data-node-title>]\\\" variable=\\\"NULL\\\">\\n\u003C$list filter=\\\"[[$:/status/IsReadOnly]get[text]!is[blank]else[no]!match[yes]]\\\" variable=\\\"NULL\\\">\\n\\t\u003C$action-setfield $tiddler=\u003C\u003Crow-edit-state>> text=\u003C\u003Cdom-data-node-title>> />\\n\u003C!--\\t\u003C$action-setfield $tiddler=\u003C\u003Cdom-data-node-title>> throttle.refresh=\\\"yes\\\"/>-->\\n\u003C/$list>\\n\u003C/$list>\\n\\\\end\\n\\n\\n\\\\define save-edit-node-actions()\\n\u003C!-- handle saving a node being edited -->\\n\u003C!-- XXX draft -->\\n\u003C!--\u003C$action-deletefield $tiddler={{{ [\u003Cdom-data-node-title>!is[blank]else\u003CcurrentTiddler>] }}} $field=\\\"throttle.refresh\\\" />-->\\n\u003C$action-deletetiddler $tiddler=\u003C\u003Crow-edit-state>> />\\n\\\\end\\n\\n\\n\\\\define indent-node-actions()\\n\u003C!-- handle indenting a node -->\\n\u003C$vars previous-node={{{ [{!!parent}get[stream-list]enlist-input[]is[tiddler]before\u003CcurrentTiddler>] }}}>\\n\u003C$list filter=\\\"[\u003Cprevious-node>minlength[1]]\\\" variable=\\\"_NULL\\\">\\n\\t\u003C$action-listops $tiddler=\u003C\u003Cprevious-node>> $field=\\\"stream-list\\\" $subfilter=\\\"+[is[tiddler]] [\u003CcurrentTiddler>]\\\"/>\\n\\t\u003C$action-listops $tiddler={{!!parent}} $field=\\\"stream-list\\\" $subfilter=\\\"+[is[tiddler]] -[\u003CcurrentTiddler>]\\\"/>\\n\\t\u003C$action-setfield $tiddler=\u003C\u003CcurrentTiddler>> parent=\u003C\u003Cprevious-node>> />\\n\u003C/$list>\\n\u003C/$vars>\\n\\\\end\\n\\n\\n\\\\define unindent-node-actions()\\n\u003C!-- handle unindenting a node -->\\n\u003C$vars new-parent={{{ [{!!parent}get[parent]] }}} new-next-node={{{ [{!!parent}get[parent]get[stream-list]enlist-input[]is[tiddler]after{!!parent}] }}}>\\n    \u003C$list filter=\\\"[\u003Cnew-parent>minlength[1]]\\\" variable=\\\"_NULL\\\">\\n        \u003C$action-listops $tiddler=\u003C\u003Cnew-parent>> $field=\\\"stream-list\\\" $subfilter=\\\"+[is[tiddler]] +[insertbefore:new-next-node\u003CcurrentTiddler>]\\\"/>\\n        \u003C$action-listops $tiddler={{!!parent}} $field=\\\"stream-list\\\" $subfilter=\\\"+[is[tiddler]] -[\u003CcurrentTiddler>]\\\"/>\\n        \u003C$action-setfield $tiddler=\u003C\u003CcurrentTiddler>> parent=\u003C\u003Cnew-parent>> />\\n    \u003C/$list>\\n\u003C/$vars>\\n\\\\end\\n\\n\\n\\\\define demote-node-actions()\\n\u003C!-- move a node below the next node -->\\n\u003C$list filter=\\\"[{!!parent}get[stream-list]enlist-input[]after\u003CcurrentTiddler>]\\\" variable=\\\"next-node\\\">\\n    \u003C$action-listops $tiddler={{!!parent}} $field=\\\"stream-list\\\" $subfilter=\\\"+[insertbefore:currentTiddler\u003Cnext-node>]\\\"/>\\n\u003C/$list>\\n\\\\end\\n\\n\\n\\\\define promote-node-actions()\\n\u003C!-- move a node above the previous node -->\\n\u003C$list filter=\\\"[{!!parent}get[stream-list]enlist-input[]before\u003CcurrentTiddler>]\\\" variable=\\\"previous-node\\\">\\n    \u003C$action-listops $tiddler={{!!parent}} $field=\\\"stream-list\\\" $subfilter=\\\"+[insertbefore:previous-node\u003CcurrentTiddler>]\\\"/>\\n\u003C/$list>\\n\\\\end\\n\\n\\n\\\\define save-node-actions()\\n\u003C$list filter=\\\"\\\"\\\"[{$:/config/sq/streams/split-at-caret}match[yes]]\\\"\\\"\\\" variable=\\\"_NULL\\\" emptyMessage=\u003C\u003Cadd-node-actions>> >\\n\u003C$list filter=\\\"[\u003CselectionEnd>!is[blank]else[0]!match[0]]\\\" variable=\\\"_NULL\\\">\\n\u003C$list filter=\\\"[\u003CcurrentTiddler>get[text]length[]subtract\u003CselectionEnd>!match[0]]\\\" variable=\\\"_NULL\\\" emptyMessage=\u003C\u003Cadd-node-actions>>>\\n\\t\u003C$macrocall $name=\\\"add-node-actions\\\" startText={{{[\u003CcurrentTiddler>get[text]split[]rest\u003CselectionEnd>join[]trim[]]}}} streamList={{!!stream-list}} />\u003C!--insertPosition=\\\"title\\\"-->\\n\\t\u003C$action-setfield $tiddler=\\\"$:/state/sq/streams/caret-position\\\" text=\\\"0\\\"/>\\n\\t\u003C$action-setfield $tiddler=\u003C\u003CcurrentTiddler>> text={{{[\u003CcurrentTiddler>get[text]split[]first\u003CselectionEnd>join[]]}}} stream-list=\\\"\\\"/>\\n\u003C/$list>\\n\u003C/$list>\\n\u003C$list filter=\\\"[\u003CselectionEnd>!is[blank]else[0]match[0]]\\\" variable=\\\"_NULL\\\">\\n\\t\u003C$list filter=\\\"[\u003CcurrentTiddler>!has[text]]\\\" variable=\\\"_NULL\\\" emptyMessage=\u003C\u003Cadd-node-actions \\\"\\\" \\\"title\\\">> >\\n\\t\\t\u003C$list filter=\\\"\\\"\\\"[{$:/config/sq/streams/exit-on-saving-empty-node}match[yes]]\\\"\\\"\\\" variable=\\\"_NULL\\\" emptyMessage=\u003C\u003Cadd-node-actions>> >\\n\\t\\t\\t\u003C\u003Ccancel-edit-node-actions>>\\n\\t\\t\u003C/$list>\\n\\t\u003C/$list>\\n\u003C/$list>\\n\u003C/$list>\\n\\\\end\\n\\n\\\\define add-new-node-actions()\\n\u003C!-- used by new node button at the bottom of a stream -->\\n\u003C$list fi )\\n\u003C!-- handle multiple nodes entered at once -->\\n\u003C$action-confirm $message=\\\"Split into multiple nodes?\\\" $prompt={{$:/config/sq/streams/prompt-split-to-multiple}}>\\n\u003C$list filter=\\\"[{!!text}splitregexp{$:/config/sq/streams/node-split-regexp}rest[]reverse[]]\\\" variable=\\\"fragment\\\">\\n\\t\u003C$action-confirm $message=\\\"Split into multiple nodes?\\\" $prompt=\\\"no\\\">\\n\\t\\t\u003C$macrocall $name=\\\"add-node-actions\\\" startText=\u003C\u003Cfragment>> />\\n\\t\u003C/$action-confirm>\\n\u003C/$list>\\n\u003C$action-setfield $tiddler=\u003C\u003CcurrentTiddler>> text={{{[{!!text}splitregexp{$:/config/sq/streams/node-split-regexp}first[]]}}}/>\\n\u003C\u003Cadd-node-actions>>\\n\u003C/$action-confirm>\\n\\\\end\\n\\n\\n\\\\define cancel-edit-node-actions()\\n\u003C!-- handle cancelling the edit on an empty node -->\\n\u003C$list filter=\\\"[\u003CcurrentTiddler>!has[stream-list]!has[text]]\\\" variable=\\\"_NULL\\\">\\n\\t\u003C$action-listops $tiddler={{{[{!!parent}]}}} $field=\\\"stream-list\\\" $subfilter=\\\"+[is[tiddler]] -[\u003CcurrentTiddler>]\\\"/>\\n\\t\u003C$action-deletetiddler $tiddler=\u003C\u003CcurrentTiddler>> />\\n\u003C/$list>\\n\u003C!--\u003C$action-deletefield $tiddler=\u003C\u003CcurrentTiddler>> $field=\\\"throttle.refresh\\\" />-->\\n\u003C$action-deletetiddler $tiddler=\u003C\u003Crow-edit-state>> />\\n\\\\end\\n\\n\\n\\\\define merge-with-previous-node-actions()\\n\u003C!-- handle backspace on an empty node -->\\n\u003C$list filter=\\\"\\\"\\\"[\u003CcurrentTiddler>!has[text]]\\\"\\\"\\\" variable=\\\"_NULL\\\">\\n\\t\u003C\u003Ccancel-edit-node-actions>>\\n\\t\u003C\u003Cfocus-higher-node-actions>>\\n\u003C/$list>\\n\\n\u003C$list filter=\\\"\\\"\\\"[\u003CcurrentTiddler>has[text]]\\\"\\\"\\\" variable=\\\"_NULL\\\">\\n\u003C$list filter=\\\"[\u003CselectionEnd>match[0]]\\\" variable=\\\"_NULL\\\">\\n\\n\u003C!--\u003C$action-log/>-->\\n\\t\u003C$set name=\\\"parent\\\" value={{!!parent}} select=\\\"0\ rrentTiddler>> to=\u003C\u003CuserInput>>/>\\n\\t\u003C$list filter=\\\"[\u003Crow-edit-state>match\u003CcurrentTiddler>]\\\" variable=\\\"_NULL\\\">\\n\\t\\t\u003C$action-setfield $tiddler=\u003C\u003Crow-edit-state>> text=\u003C\u003CuserInput>>/>\\n\\t\u003C/$list>\\n\\\"\\\"\\\"/>\\n\\\\end\\n\\n\\n\\\\define find-last-child()\\n\u003C!-- used by focus-higher-node-actions macro -->\\n\u003C$list filter=\\\"[enlist{!!stream-list}is[tiddler]last[]]\\\" emptyMessage=\\\"\\\"\\\"\u003C$action-setfield $tiddler=\u003C\u003Crow-edit-state>> text=\u003C\u003CcurrentTiddler>>/>\\\"\\\"\\\">\\n\\t\u003C$macrocall $name=\\\"find-last-child\\\"/>\\n\u003C/$list>\\n\\\\end\\n\\n\\n\\\\define focus-higher-node-actions()\\n\u003C!-- handles moving up in the nodes with the keyboard -->\\n\u003C$vars old-parent={{!!parent}} >\\n\u003C$list filter=\\\"[{!!parent}get[stream-list]enlist-input[]is[tiddler]before\u003CcurrentTiddler>]\\\" emptyMessage=\\\"\\\"\\\"\u003C$list filter=\\\"[\u003Cold-parent>!match\u003Cstream-root-title>]\\\">\u003C$action-setfield $tiddler=\u003C\u003Crow-edit-state>> text=\u003C\u003Cold-parent>> />\u003C/$list>\\\"\\\"\\\">\\n\\t\u003C$macrocall $name=\\\"find-last-child\\\"/>\\n\u003C/$list>\\n\u003C/$vars>\\n\\\\end\\n\\n\\n\\\\define find-next-downwards-node()\\n\u003C!-- used by focus-lower-node-actions macro -->\\n\u003C$list filter=\\\"[\u003CcurrentTiddler>has[parent]]\\\" variable=\\\"_NULL\\\">\\n\u003C$set name=\\\"old-parent\\\" value={{!!parent}} select=\\\"0\\\">\\n\u003C$set name=\\\"old-parent-nodes\\\" filter=\\\"[\u003Cold-parent>get[stream-list]]\\\" select=\\\"0\\\">\\n\u003C$list filter=\\\"[enlist\u003Cold-parent-nodes>is[tiddler]after\u003CcurrentTiddler>]\\\" emptyMessage=\\\"\\\"\\\"\u003C$set name=\\\"currentTiddler\\\" value=\u003C\u003Cold-parent>>>\u003C\u003Cfind-next-downwards-node>>\u003C/$set>\\\"\\\"\\\">\\n\\t\u003C$action-setfield $tiddler=\u003C\u003Crow-edit-state>> text=\u003C\u003CcurrentTiddler>>/>\\t\\n\u003C/ tBrackets>]}}}>\\n\u003C!-- if target has no stream-type, assign one -->\\n\u003C$list filter=\\\"[\u003CdropTargetTiddler>!has[stream-type]]\\\">\\n\\t\u003C$action-setfield $tiddler=\u003C\u003CdropTargetTiddler>> stream-type=\\\"default\\\"/>\\n\u003C/$list>\\n\u003C!-- if action tiddler has no stream-type, assign one -->\\n\u003C$list filter=\\\"[\u003CactionTiddler>!has[stream-type]]\\\" variable=\\\"_NULL\\\">\\n\\t\u003C$action-setfield $tiddler=\u003C\u003CactionTiddler>> stream-type=\\\"default\\\" />\\n\u003C/$list>\\n\u003C!-- if we are dropping onto a new parent, then we might need to handle modifier keys -->\\n\u003C$list filter=\\\"[\u003CactionTiddler>get[parent]!match\u003Cparent>] [\u003CactionTiddler>!has[parent]]\\\" variable=\\\"_NULL\\\">\\n\\t\u003C$wikify name=\\\"new-node\\\" text={{$:/config/sq/streams/new-node-title}}>\\n\\t\\t\u003C!-- ctrl modifier key on drop event -->\\n\\t\\t\u003C!-- create a new node with text of dropped node -->\\n\\t\\t\u003C$list filter=\\\"[\u003Cmodifier>match{$:/config/sq/streams/dnd-modifier-copy-node}]\\\" variable=\\\"_NULL\\\">\\n\\t\\t\\t\u003C$action-createtiddler $basetitle=\u003C\u003Cnew-node>> text={{{ [\u003CactionTiddler>get[text]] }}} parent=\u003C\u003Cparent>> stream-type=\\\"default\\\"/>\\n\\t\\t\\t\u003C!-- insert into correct position on new parent -->\\n\\t\\t\\t\u003C$action-listops $tiddler=\u003C\u003CdropTargetTiddler>> $field=\\\"stream-list\\\" $subfilter=\\\"+[insertbefore:currentTiddler\u003Cnew-node>]\\\"/>\\n\\t\\t\u003C/$list>\\n\\t\\t\u003C!-- shift modifier key on drop event -->\\n\\t\\t\u003C$list filter=\\\"[\u003Cmodifier>match{$:/config/sq/streams/dnd-modifier-transclude-node}]\\\" variable=\\\"_NULL\\\">\\n\\t\\t\\t\u003C!-- create new node on target, in correct position, text is a transclusion-->\\n\\t\\t\\t\u003C$action-createtiddler $basetitle=\u003C\u003Cnew-node>> text={{{ [\u003CactionTiddler>addprefix[{{]addsuffix[}}]] }}} parent=\u003C\u003Cparent>> stream-type=\\\" ion\": \"Position of context menu shown on swiping.\",\n            \"caption\": \"Position of context menu shown on swiping.\",\n            \"settings-template\": \"$:/plugins/sq/streams/ui/templates/settings/select\",\n            \"settings-group\": \"swipe\",\n            \"option-names\": \"[[Right]] [[Left]]\",\n            \"option-values\": \"right left\",\n            \"condition\": \"[[$:/config/sq/streams/swipe-enabled]get[text]match[yes]]\",\n            \"text\": \"right\"\n        },\n        \"$:/config/sq/streams/swipe-enabled\": {\n            \"title\": \"$:/config/sq/streams/swipe-enabled\",\n            \"description\": \"Enable swipe to show context menu on touch devices.\",\n            \"caption\": \"Enable swipe to show context menu on nodes.\",\n            \"settings-template\": \"$:/plugins/sq/streams/ui/templates/settings/input-switch\",\n            \"settings-group\": \"swipe\",\n            \"settings-group-header\": \"0\",\n            \"text\": \"yes\"\n        },\n        \"$:/config/sq/streams/swipe-threshold\": {\n            \"title\": \"$:/config/sq/streams/swipe-threshold\",\n            \"description\": \"Distance in pixels that triggers a swipe, defaults to 100\",\n            \"caption\": \"Swipe threshold in pixels\",\n            \"settings-template\": \"$:/plugins/sq/streams/ui/templates/settings/input\",\n            \"settings-group\": \"swipe\",\n            \"condition\": \"[[$:/config/sq/streams/swipe-enabled]get[text]match[yes]]\",\n            \"text\": \"70\"\n        },\n        \"$:/plugins/sq/streams/contextmenu/contextmenu-styles\": {\n            \"title\": \"$:/plugins/sq/streams/contextmenu/contextmenu-styles\",\n            \"text\": \".sq-contextmenu {\\n\\tpadding: 12px 0;\\n\\tbox-shadow: rgba(0, 0, 0, 0.40) 0px 2px 20px;\\n\\tfont-family: \\\"Segoe UI\\\", Roboto, Helvetica, Arial;\\n\\tfont-size: 13px;\\n\\tmargin-top: 4px;\\n\\tmin-width: 100px;\\n\\tmax-width: 240px;\\n\\tleft: -16px;\\n\\tdisplay:
